<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto y Tarifas</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; color: #333;">

    <nav style="background-color: #0f172a; padding: 20px; text-align: center; border-bottom: 3px solid #3b82f6;">
        <a href="index.html" style="color: #3b82f6; text-decoration: none; font-weight: bold;">&#8592; Volver a la Página Principal</a>
    </nav>

    <main style="padding: 40px 20px; text-align: center;">
        <h1 style="color: #0f172a;">Contacto y Cotizaciones</h1>
        
        <div style="background-color: #ffffff; width: 90%; max-width: 600px; margin: 30px auto; padding: 30px; border: 1px solid #cbd5e1; border-radius: 8px;">
            <h2 style="color: #3b82f6; margin-top: 0;">Envíame un mensaje</h2>
            <form style="text-align: left;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold;" for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" style="width: 95%; padding: 10px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 4px;">

                <label style="display: block; margin-bottom: 5px; font-weight: bold;" for="email">Correo Electrónico:</label>
                <input type="email" id="email" style="width: 95%; padding: 10px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 4px;">

                <button type="button" style="background-color: #3b82f6; color: white; border: none; padding: 12px 25px; cursor: pointer; border-radius: 4px; font-weight: bold; width: 100%;">Enviar Consulta</button>
            </form>
        </div>

        <div style="background-color: #ffffff; width: 90%; max-width: 600px; margin: 40px auto; padding: 30px; border: 1px solid #cbd5e1; border-radius: 8px; overflow-x: auto;">
            <h2 style="color: #3b82f6; margin-top: 0;">Valores de Referencia</h2>
            <table style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead>
                    <tr style="background-color: #f1f5f9;">
                        <th style="border: 1px solid #cbd5e1; padding: 12px; color: #0f172a;">Servicio Técnico</th>
                        <th style="border: 1px solid #cbd5e1; padding: 12px; color: #0f172a;">Valor Inicial</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td style="border: 1px solid #cbd5e1; padding: 12px;">Optimización Técnica (Hardware/Software)</td>
                        <td style="border: 1px solid #cbd5e1; padding: 12px;">$150.000 CLP</td>
                    </tr>
                    <tr>
                        <td style="border: 1px solid #cbd5e1; padding: 12px;">Desarrollo Web Integrado (Sistemas)</td>
                        <td style="border: 1px solid #cbd5e1; padding: 12px;">Previa Evaluación</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

</body>
</html>
